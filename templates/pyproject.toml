# pyproject.toml

[tool.ruff]
line-length = 120

exclude = [".venv", "setup.py", "__pycache__", "*.pyc"]

[tool.ruff.lint]
select = [
    "E", # pycodestyle errors
    "W", # pycodestyle warnings
    "F", # Pyflakes
    "I", # isort (导入排序)
]

ignore = [
    "E731", # Do not assign a lambda expression, use a def
    "E741", # Ambiguous variable name
]

[tool.ruff.lint.isort]
force-to-top = ["pkg_resources"]
order-by-type = true
